services:
  debridmoviemapper:
    image: ghcr.io/phrontizo/debridmoviemapper:latest
    container_name: debridmoviemapper
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - RD_API_TOKEN=${RD_API_TOKEN:?Set RD_API_TOKEN in .env or environment}
      - TMDB_API_KEY=${TMDB_API_KEY:?Set TMDB_API_KEY in .env or environment}
      - DB_PATH=/data/metadata.db
      # - PORT=8080  # WebDAV server port (must match ports mapping above)
      # Jellyfin notifications (all three required to enable)
      - JELLYFIN_URL=http://jellyfin:8096
      - JELLYFIN_API_KEY=${JELLYFIN_API_KEY:-}
      - JELLYFIN_RCLONE_MOUNT_PATH=/media
    volumes:
      - metadata:/data
    # Overrides Dockerfile HEALTHCHECK with faster intervals for depends_on startup ordering
    healthcheck:
      test: ["CMD", "/debridmoviemapper", "--healthcheck"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  rclone:
    image: rclone/rclone:latest
    container_name: rclone
    restart: unless-stopped
    user: "65534:65534"
    depends_on:
      debridmoviemapper:
        condition: service_healthy
    devices:
      - /dev/fuse
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - ./rclone:/data:rshared
    environment:
      - TZ=Europe/London
    command: >
      mount :webdav: /data
      --webdav-url http://debridmoviemapper:8080
      --webdav-vendor other
      --vfs-cache-mode off
      --allow-other
      --allow-non-empty
      --dir-cache-time 10s
      --poll-interval 15s
    healthcheck:
      test: ["CMD-SHELL", "grep -q fuse /proc/self/mountinfo"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 3

  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    user: "65534:65534"
    depends_on:
      rclone:
        condition: service_healthy
    ports:
      - "8096:8096"
    volumes:
      - jellyfin-config:/config
      - jellyfin-cache:/cache
      - ./rclone:/media:ro
    # devices:
    #   - /dev/dri:/dev/dri  # Uncomment for hardware transcoding (requires GPU)

volumes:
  metadata: {}
  jellyfin-cache: {}
  jellyfin-config: {}
