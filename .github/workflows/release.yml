name: Release

on:
  push:
    tags: ["v*"]

permissions: {}

env:
  GHCR_IMAGE: ghcr.io/phrontizo/debridmoviemapper
  DOCKERHUB_IMAGE: phrontizo/debridmoviemapper

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

  test:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v6

      # `secrets` cannot be used in `if:` conditions, so resolve availability into a step
      # output here (secrets ARE allowed in `env`/`run`) and gate later steps on it.
      - name: Check Docker Hub availability
        id: dockerhub
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -n "$DOCKERHUB_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker Hub is optional: only log in and tag for it when the secret is set,
      # so releases still publish to GHCR on forks without the Docker Hub secret.
      - name: Log in to Docker Hub
        if: ${{ steps.dockerhub.outputs.enabled == 'true' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute target images
        id: images
        env:
          HAS_DOCKERHUB: ${{ steps.dockerhub.outputs.enabled }}
        run: |
          {
            echo "value<<EOF"
            echo "${GHCR_IMAGE}"
            if [ "$HAS_DOCKERHUB" = "true" ]; then
              echo "${DOCKERHUB_IMAGE}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Extract version tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.images.outputs.value }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
